services:
  - type: web
    name: campus-credit-collection
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: STORAGE_DIR
        value: runtime-data
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_HOURS
        value: 8
      - key: MIN_LOAN_AMOUNT
        value: 100
      - key: MAX_LOAN_AMOUNT
        value: 1000
      - key: DEFAULT_INTEREST_RATE
        value: 0.30
      - key: LATE_MONTH_INTEREST_RATE
        value: 0.25
      - key: REPAYMENT_DUE_DAY
        value: 27
